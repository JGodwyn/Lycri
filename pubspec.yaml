name: lycri_lyrics
description: "Lycri — Desktop lyric presentation app for macOS."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0

  # Backend (scaffold now, activate later)
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0

  # Windowing & display
  window_manager: ^0.3.9
  screen_retriever: ^0.1.9

  # File handling
  file_picker: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  assets:
    - .env

  fonts:
    # ── Libre Caslon Condensed (display / headings / UI labels) ───────────────
    - family: Libre Caslon Condensed
      fonts:
        - asset: assets/fonts/LibreCaslonCondensed-Regular.ttf
          weight: 400
        - asset: assets/fonts/LibreCaslonCondensed-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/LibreCaslonCondensed-Medium.ttf
          weight: 500
        - asset: assets/fonts/LibreCaslonCondensed-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/LibreCaslonCondensed-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/LibreCaslonCondensed-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/LibreCaslonCondensed-Bold.ttf
          weight: 700
        - asset: assets/fonts/LibreCaslonCondensed-BoldItalic.ttf
          weight: 700
          style: italic

    # ── Libre Caslon Text (body / paragraph text) ─────────────────────────────
    - family: Libre Caslon Text
      fonts:
        - asset: assets/fonts/LibreCaslonText-Regular.ttf
          weight: 400
        - asset: assets/fonts/LibreCaslonText-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/LibreCaslonText-Bold.ttf
          weight: 700

    # ── Source Code Pro (code blocks only) ────────────────────────────────────
    - family: Source Code Pro
      fonts:
        - asset: assets/fonts/SourceCodePro-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/SourceCodePro-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/SourceCodePro-Light.ttf
          weight: 300
        - asset: assets/fonts/SourceCodePro-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/SourceCodePro-Regular.ttf
          weight: 400
        - asset: assets/fonts/SourceCodePro-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/SourceCodePro-Medium.ttf
          weight: 500
        - asset: assets/fonts/SourceCodePro-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/SourceCodePro-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SourceCodePro-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/SourceCodePro-Bold.ttf
          weight: 700
        - asset: assets/fonts/SourceCodePro-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/SourceCodePro-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/SourceCodePro-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/SourceCodePro-Black.ttf
          weight: 900
        - asset: assets/fonts/SourceCodePro-BlackItalic.ttf
          weight: 900
          style: italic
